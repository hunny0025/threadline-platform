# ============================================================
# Threadline Platform - Docker Compose (Local Dev)
# One command startup: docker-compose up
# Runs: Backend API + Vite Frontend + MongoDB + Redis
# ============================================================

version: '3.9'

services:

  # ── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: threadline-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: threadline
    volumes:
      - mongo_data:/data/db
    networks:
      - threadline-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: threadline-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - threadline-net

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadline-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/threadline
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - threadline-net
    command: npm run dev

  # ── Frontend (Vite + React) ───────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: threadline-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    env_file:
      - ./client/.env
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - threadline-net

# ── Volumes ───────────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:

# ── Network ───────────────────────────────────────────────
networks:
  threadline-net:
    driver: bridge
