openapi: 3.0.0
info:
  title: Threadline API
  version: 1.0.0
  description: Fashion e-commerce platform API
servers:
  - url: /api/v1
paths:
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: Success
  /users/register:
    post:
      summary: Register a new user
      responses:
        '200':
          description: Success
  /users/login:
    post:
      summary: Login
      responses:
        '200':
          description: Success
  /orders:
    get:
      summary: Get all orders
      responses:
        '200':
          description: Success