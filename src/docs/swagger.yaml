openapi: 3.0.0
info:
  title: Threadline API
  version: 1.0.0
  description: Fashion e-commerce platform API

servers:
  - url: /api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        status:
          type: integer
          example: 400
        message:
          type: string
          example: "Something went wrong"
        data:
          nullable: true
          example: null

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        status:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object

paths:

  # ── AUTH ─────────────────────────────────────────────────────

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Shivangi Patel"
                email:
                  type: string
                  example: "shivangi@threadline.com"
                password:
                  type: string
                  example: "SecurePass@123"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              example:
                success: true
                status: 201
                message: "User registered successfully"
                data:
                  id: "69bea2a59e0e8c8a23ee26c3"
                  name: "Shivangi Patel"
                  email: "shivangi@threadline.com"
        '400':
          description: Validation error or duplicate email
          content:
            application/json:
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    success: false
                    status: 400
                    message: "Name, email and password are required"
                    data: null
                duplicateEmail:
                  summary: Email already registered
                  value:
                    success: false
                    status: 400
                    message: "Email already registered"
                    data: null

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "shivangi@threadline.com"
                password:
                  type: string
                  example: "SecurePass@123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Login successful"
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    id: "69bea2a59e0e8c8a23ee26c3"
                    name: "Shivangi Patel"
                    email: "shivangi@threadline.com"
                    role: "user"
        '400':
          description: Missing email or password
          content:
            application/json:
              example:
                success: false
                status: 400
                message: "Email and password are required"
                data: null
        '401':
          description: Invalid credentials
          content:
            application/json:
              example:
                success: false
                status: 401
                message: "Invalid email or password"
                data: null

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token cookie
      tags: [Auth]
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Token refreshed"
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: No or invalid refresh token
          content:
            application/json:
              example:
                success: false
                status: 401
                message: "No refresh token"
                data: null

  /auth/logout:
    post:
      summary: Logout user and clear refresh token cookie
      tags: [Auth]
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Logged out successfully"
                data: null

  # ── PRODUCTS ─────────────────────────────────────────────────

  /products:
    get:
      summary: Get all products with pagination and filters
      tags: [Products]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
        - name: category
          in: query
          schema:
            type: string
            example: "69bd65ba44122be098ca7ab2"
        - name: gender
          in: query
          schema:
            type: string
            enum: [men, women, unisex]
        - name: fitType
          in: query
          schema:
            type: string
            enum: [slim, regular, oversized]
        - name: minPrice
          in: query
          schema:
            type: number
            example: 500
        - name: maxPrice
          in: query
          schema:
            type: number
            example: 3000
      responses:
        '200':
          description: Products fetched successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Products fetched successfully"
                data:
                  data:
                    - _id: "69bd65ba44122be098ca7ae9"
                      name: "Leather Biker Jacket"
                      slug: "leather-biker-jacket"
                      basePrice: 7999
                      fitType: "slim"
                      fabricWeight: "heavy"
                      gender: "unisex"
                      isActive: true
                      category:
                        _id: "69bd65ba44122be098ca7ab3"
                        name: "Jackets"
                        slug: "jackets"
                  pagination:
                    total: 57
                    page: 1
                    limit: 10
                    totalPages: 6

  /products/filter:
    post:
      summary: Advanced product filter with size and color support
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gender:
                  type: string
                  enum: [men, women, unisex]
                fitType:
                  type: string
                  enum: [slim, regular, oversized]
                fabricWeight:
                  type: string
                  enum: [light, medium, heavy]
                size:
                  type: string
                  enum: [XS, S, M, L, XL, XXL]
                color:
                  type: string
                  example: "black"
                minPrice:
                  type: number
                  example: 500
                maxPrice:
                  type: number
                  example: 3000
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 20
            example:
              gender: "women"
              fitType: "slim"
              size: "M"
              minPrice: 800
              maxPrice: 2500
      responses:
        '200':
          description: Products filtered successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Products filtered successfully"
                data:
                  data:
                    - _id: "69bd65ba44122be098ca7ae1"
                      name: "Women Tailored Cigarette Trousers"
                      basePrice: 1999
                      fitType: "slim"
                      gender: "women"
                      variants:
                        - size: "M"
                          color: "black"
                          stock: 18
                          price: 1999
                          inStock: true
                  pagination:
                    total: 4
                    page: 1
                    limit: 20
                    totalPages: 1

  # ── CATEGORIES ───────────────────────────────────────────────

  /categories:
    get:
      summary: Get all active categories
      tags: [Categories]
      responses:
        '200':
          description: Categories fetched successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Categories fetched successfully"
                data:
                  - _id: "69bd65ba44122be098ca7aae"
                    name: "T-Shirts"
                    slug: "t-shirts"
                    description: "Everyday essential tees"
                    isActive: true
                    sortOrder: 1

  # ── NEWSLETTER ───────────────────────────────────────────────

  /newsletter/subscribe:
    post:
      summary: Subscribe to Threadline newsletter
      tags: [Newsletter]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: "shopper@gmail.com"
      responses:
        '201':
          description: Subscribed successfully
          content:
            application/json:
              example:
                success: true
                status: 201
                message: "Successfully subscribed to Threadline newsletter"
                data:
                  email: "shopper@gmail.com"
                  subscribedAt: "2026-03-26T07:05:20.746Z"
        '400':
          description: Invalid or missing email
          content:
            application/json:
              examples:
                missingEmail:
                  summary: Email not provided
                  value:
                    success: false
                    status: 400
                    message: "Email is required"
                    data: null
                invalidEmail:
                  summary: Invalid email format
                  value:
                    success: false
                    status: 400
                    message: "Please provide a valid email address"
                    data: null
        '409':
          description: Email already subscribed
          content:
            application/json:
              example:
                success: false
                status: 409
                message: "This email is already subscribed"
                data: null
        '429':
          description: Too many subscription attempts
          content:
            application/json:
              example:
                success: false
                status: 429
                message: "Too many subscription attempts. Please try again later."
                data: null

  # ── CONTENT ──────────────────────────────────────────────────

  /content/{slug}:
    get:
      summary: Get page content by slug
      tags: [Content]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            enum: [about, faq, returns]
          example: about
      responses:
        '200':
          description: Content fetched successfully
          content:
            application/json:
              example:
                success: true
                status: 200
                message: "Content fetched successfully"
                data:
                  slug: "about"
                  title: "About Threadline"
                  body: "# About Threadline\n\nThreadline is a premium fashion e-commerce platform."
                  lastEditedBy: null
                  updatedAt: "2026-03-26T07:29:53.468Z"
        '404':
          description: Content page not found
          content:
            application/json:
              example:
                success: false
                status: 404
                message: "Content page not found"
                data: null