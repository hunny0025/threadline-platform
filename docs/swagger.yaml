openapi: 3.0.0
info:
  title: Threadline API
  description: E-commerce platform API - Products, Cart, Orders, Payments
  version: 1.0.0
  contact:
    name: API Support
    email: support@threadline.com

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.threadline.com
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        status:
          type: integer
          example: 400
        message:
          type: string
        data:
          type: object
          nullable: true

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        basePrice:
          type: number
        category:
          type: object
        images:
          type: array
          items:
            type: string

    Cart:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        items:
          type: array
          items:
            type: object

    Order:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        items:
          type: array
        totalAmount:
          type: number
        statusHistory:
          type: array

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        200:
          description: OK
        503:
          description: DEGRADED

  /api/v1/auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        201:
          description: User created
        400:
          description: Validation error

  /api/v1/auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /api/v1/products:
    get:
      summary: List products
      tags: [Products]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        200:
          description: Products list

  /api/v1/cart:
    get:
      summary: Get cart
      tags: [Cart]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Cart data

  /api/v1/orders:
    get:
      summary: Get user orders
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Order history
    post:
      summary: Create order from cart
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        201:
          description: Order created

  /api/v1/payment/create-intent:
    post:
      summary: Create payment intent
      tags: [Payment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: string
      responses:
        201:
          description: Payment intent created